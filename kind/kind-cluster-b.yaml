kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cluster-b
featureGates:
  PodCertificateRequest: true
  ClusterTrustBundle: true
  ClusterTrustBundleProjection: true
runtimeConfig:
  "certificates.k8s.io/v1beta1": "true"
nodes:
- role: control-plane
  image: kindest/node:v1.35.0
  extraPortMappings:
  - containerPort: 30443
    hostPort: 30443
    protocol: TCP
